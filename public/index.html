<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panhol — мессенджер</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #e9eef3;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .messenger {
            width: 100%;
            max-width: 1300px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width: 768px) {
            .messenger {
                flex-direction: row;
                height: 95vh;
                width: 98vw;
                border-radius: 28px;
                box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            }
        }
        .mobile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #edf2f7;
        }
        .mobile-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2b4c8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .my-id {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50vw;
        }
        .sidebar {
            background: #f8fafd;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 20;
        }
        @media (max-width: 767px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 85%;
                max-width: 300px;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
                background: #f8fafd;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .chat-area {
                width: 100%;
            }
            .menu-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.4);
                z-index: 15;
                display: none;
            }
            .menu-overlay.open {
                display: block;
            }
        }
        @media (min-width: 768px) {
            .sidebar {
                width: 320px;
                position: relative;
                transform: none !important;
            }
            .menu-overlay {
                display: none;
            }
            .mobile-menu-btn {
                display: none;
            }
        }
        .mobile-menu-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
        }
        .sidebar-header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 {
            font-size: 1.2rem;
        }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
        }
        @media (max-width: 767px) {
            .close-sidebar {
                display: block;
            }
        }
        .tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #edf2f7;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #4a5568;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: #eef2ff;
            color: #1e3a8a;
        }
        .chat-list, .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 12px;
            margin-bottom: 4px;
            border-radius: 20px;
            cursor: pointer;
        }
        .chat-item:hover, .contact-item:hover {
            background: #eef2ff;
        }
        .chat-item.active {
            background: #dbeafe;
        }
        .avatar {
            width: 52px;
            height: 52px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chat-preview {
            font-size: 0.8rem;
            color: #5b6e8c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action-buttons {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .action-btn {
            flex: 1;
            background: #eef2ff;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            height: 100%;
        }
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .chat-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .call-buttons {
            display: flex;
            gap: 12px;
        }
        .call-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fefefe;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .message.outgoing {
            align-self: flex-end;
            background: #1e3a8a;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.incoming {
            align-self: flex-start;
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 12px;
            align-items: center;
            background: white;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
        }
        .emoji-picker {
            position: relative;
        }
        .emoji-btn, .voice-btn, .send-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-dropdown {
            position: absolute;
            bottom: 60px;
            left: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 260px;
            z-index: 100;
            border: 1px solid #e2e8f0;
        }
        .hidden { display: none; }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 320px;
            max-width: 90%;
        }
        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 24px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .recording-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
<div class="messenger">
    <div class="mobile-header">
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
        <h2>Panhol</h2>
        <div class="my-id" id="myIdDisplay">Загрузка...</div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Меню</h3>
            <button class="close-sidebar" id="closeSidebar">✕</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="chats">Чаты</button>
            <button class="tab-btn" data-tab="contacts">Контакты</button>
        </div>
        <div id="chatsList" class="chat-list"></div>
        <div id="contactsList" class="contacts-list hidden"></div>
        <div class="action-buttons">
            <button id="addContactBtn" class="action-btn">➕ Добавить друга</button>
            <button id="createGroupBtn" class="action-btn">👥 Создать группу</button>
        </div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-title">
                <div class="avatar" id="currentChatAvatar">👤</div>
                <h3 id="currentChatName">Выберите чат</h3>
            </div>
            <div class="call-buttons">
                <button id="voiceCallBtn" class="call-btn" title="Аудиозвонок">📞</button>
                <button id="videoCallBtn" class="call-btn" title="Видеозвонок">📹</button>
            </div>
        </div>
        <div id="messagesContainer" class="messages-container">
            <div style="text-align: center; color: #94a3b8;">👈 Выберите диалог</div>
        </div>
        <div class="input-area">
            <div class="emoji-picker">
                <button id="emojiBtn" class="emoji-btn">😊</button>
                <div id="emojiDropdown" class="emoji-dropdown hidden">
                    <span>😀</span><span>😂</span><span>❤️</span><span>🔥</span><span>👍</span><span>🎉</span>
                    <span>😍</span><span>😭</span><span>😎</span><span>😡</span><span>🤔</span><span>🥳</span>
                    <span>😱</span><span>💀</span><span>👋</span><span>🙏</span><span>💔</span><span>✨</span>
                </div>
            </div>
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="voiceMessageBtn" class="voice-btn" title="Голосовое">🎤</button>
            <button id="sendMessageBtn" class="send-btn">📤</button>
        </div>
    </div>
</div>
<div class="recording-indicator" id="recordingIndicator">🎤 Запись...</div>

<script>
    const socket = io();
    let myUserId = null;
    let currentChatId = null;
    let chats = [];
    let contacts = [];
    let messages = {};

    // Регистрация
    let storedId = localStorage.getItem("panhol_userId");
    socket.emit('register', { userId: storedId }, (response) => {
        myUserId = response.userId;
        localStorage.setItem("panhol_userId", myUserId);
        document.getElementById("myIdDisplay").innerText = `ID: ${myUserId.slice(0,8)}...`;
        document.getElementById("myIdDisplay").title = myUserId;
        // После регистрации сразу запросим чаты (сервер пришлёт автоматически, но на всякий случай)
    });

    // Получение списка чатов
    socket.on('chats_list', (data) => {
        chats = data;
        renderChatsList();
        // Если текущий чат уже не существует, сбросим
        if (currentChatId && !chats.some(c => c.id === currentChatId)) {
            currentChatId = null;
            document.getElementById("currentChatName").innerText = "Выберите чат";
            document.getElementById("currentChatAvatar").innerText = "👤";
            document.getElementById("messagesContainer").innerHTML = '<div style="text-align:center; color:#94a3b8;">👈 Выберите диалог</div>';
        }
    });

    socket.on('contacts_list', (data) => {
        contacts = data;
        renderContactsList();
    });

    socket.on('new_message', ({ chatId, message }) => {
        if (!messages[chatId]) messages[chatId] = [];
        messages[chatId].push(message);
        if (currentChatId === chatId) renderMessages(chatId);
        // Обновить превью в списке чатов
        const chatIndex = chats.findIndex(c => c.id === chatId);
        if (chatIndex !== -1) {
            chats[chatIndex].lastMessage = message;
            renderChatsList();
        }
        if (navigator.vibrate) navigator.vibrate(200);
    });

    socket.on('contact_status', ({ userId, online }) => {
        const contact = contacts.find(c => c.id === userId);
        if (contact) contact.online = online;
        renderContactsList();
    });

    socket.on('contact_added', ({ contactId }) => {
        // Обновим контакты и чаты
        socket.emit('get_contacts'); // но лучше перезапросить автоматически, но у нас нет такого эмита, просто перерисуем из кэша? Мы не храним полный список контактов на клиенте, поэтому лучше запросить заново.
        // Для простоты — перезапросим через событие, но добавим обработчик на сервере.
        // Вместо этого мы можем просто перезагрузить страницу или предложить пользователю обновить.
        // Добавим функцию запроса контактов на сервер.
        socket.emit('request_contacts'); // добавим на сервере
    });

    // Добавим обработчик для request_contacts на сервере (позже)

    socket.on('incoming_call', ({ from, isVideo }) => {
        if (confirm(`${isVideo ? 'Видеозвонок' : 'Звонок'} от ${from.slice(0,8)}... Принять?`)) {
            alert("Функция звонков в разработке");
            // Здесь можно реализовать WebRTC, но пока заглушка
        }
    });

    // Запрос истории
    async function loadChatHistory(chatId) {
        return new Promise((resolve) => {
            socket.emit('get_chat_history', chatId, (response) => {
                if (response.success) {
                    messages[chatId] = response.messages;
                    resolve(response.messages);
                } else {
                    resolve([]);
                }
            });
        });
    }

    // Открыть чат
    async function openChat(chatId) {
        if (currentChatId === chatId) return;
        currentChatId = chatId;
        const chat = chats.find(c => c.id === chatId);
        if (chat) {
            document.getElementById("currentChatName").innerText = chat.name;
            document.getElementById("currentChatAvatar").innerText = chat.avatar;
            if (!messages[chatId]) {
                await loadChatHistory(chatId);
            }
            renderMessages(chatId);
        }
        renderChatsList(); // обновить активный класс
        closeSidebarOnMobile();
    }

    function renderMessages(chatId) {
        const container = document.getElementById("messagesContainer");
        const msgs = messages[chatId] || [];
        if (!msgs.length) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8;">💬 Напишите первое сообщение!</div>';
            return;
        }
        container.innerHTML = "";
        msgs.forEach(msg => {
            const isOutgoing = msg.senderId === myUserId;
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            let content = escapeHtml(msg.text);
            if (msg.type === 'voice') content = `🎤 ${content}`;
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            msgDiv.innerHTML = `
                <div>${content}</div>
                <div class="message-time">${time}</div>
            `;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderChatsList() {
        const container = document.getElementById("chatsList");
        container.innerHTML = "";
        chats.forEach(chat => {
            const lastMsg = chat.lastMessage ? chat.lastMessage.text : "Нет сообщений";
            const div = document.createElement("div");
            div.className = `chat-item ${currentChatId === chat.id ? "active" : ""}`;
            div.innerHTML = `
                <div class="avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)}</div>
                    <div class="chat-preview">${escapeHtml(lastMsg)}</div>
                </div>
            `;
            div.addEventListener("click", () => openChat(chat.id));
            container.appendChild(div);
        });
    }

    function renderContactsList() {
        const container = document.getElementById("contactsList");
        container.innerHTML = "";
        contacts.forEach(contact => {
            const div = document.createElement("div");
            div.className = "contact-item";
            div.innerHTML = `
                <div class="avatar">${contact.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(contact.name)}</div>
                    <div style="font-size:0.7rem;">${contact.online ? '🟢 онлайн' : '⚫ офлайн'}</div>
                </div>
            `;
            div.addEventListener("click", () => {
                // Найти чат с этим контактом
                const existingChat = chats.find(c => c.type === 'private' && c.name.includes(contact.id.slice(0,6)));
                if (existingChat) openChat(existingChat.id);
                else {
                    // Если чата нет, создадим через добавление контакта (сервер создаст чат автоматически)
                    socket.emit('add_contact', contact.id, (res) => {
                        if (res.success) {
                            // Чат создастся, придёт обновлённый список чатов
                            // Но можно сразу открыть чат после ответа, но проще подождать обновления
                            alert("Чат создан, выберите его в списке");
                        }
                    });
                }
                closeSidebarOnMobile();
            });
            container.appendChild(div);
        });
    }

    // Отправка сообщения
    function sendMessage() {
        if (!currentChatId) {
            alert("Выберите чат");
            return;
        }
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        socket.emit('send_message', { chatId: currentChatId, text, type: 'text' }, (response) => {
            if (!response.success) {
                alert(response.error || "Ошибка отправки");
            } else {
                input.value = "";
                // Сообщение добавится через событие new_message
            }
        });
    }

    // Голосовые сообщения (запись)
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    async function startVoiceRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    socket.emit('send_message', { chatId: currentChatId, text: base64, type: 'voice' }, (res) => {
                        if (!res.success) alert(res.error);
                    });
                };
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                document.getElementById("recordingIndicator").style.display = "none";
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById("recordingIndicator").style.display = "block";
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            }, 15000);
        } catch(e) {
            alert("Не удалось получить доступ к микрофону");
        }
    }

    function stopVoiceRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
    }

    // Добавление контакта
    function showAddContactModal() {
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>Добавить друга</h3>
                <input id="friendId" placeholder="Введите ID друга">
                <div class="modal-buttons">
                    <button id="modalCancel">Отмена</button>
                    <button id="modalConfirm">Добавить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector("#modalConfirm").onclick = () => {
            const friendId = modalDiv.querySelector("#friendId").value.trim();
            if (friendId) {
                socket.emit('add_contact', friendId, (res) => {
                    if (res.success) {
                        alert("Контакт добавлен! Чат создан.");
                        // После добавления обновятся списки автоматически
                    } else alert(res.error);
                });
            }
            modalDiv.remove();
        };
        modalDiv.querySelector("#modalCancel").onclick = () => modalDiv.remove();
    }

    // Создание группы
    function showCreateGroupModal() {
        const contactList = contacts.map(c => `<label><input type="checkbox" value="${c.id}"> ${c.name}</label>`).join("");
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>Создать группу</h3>
                <input id="groupName" placeholder="Название группы">
                <div>Участники:</div>
                <div id="groupMembersList">${contactList}</div>
                <div class="modal-buttons">
                    <button id="modalCancel">Отмена</button>
                    <button id="modalConfirm">Создать</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector("#modalConfirm").onclick = () => {
            const name = modalDiv.querySelector("#groupName").value;
            const participants = Array.from(modalDiv.querySelectorAll("#groupMembersList input:checked")).map(cb => cb.value);
            socket.emit('create_group', { name, participants }, (res) => {
                if (res.success) alert("Группа создана!");
                else alert(res.error);
            });
            modalDiv.remove();
        };
        modalDiv.querySelector("#modalCancel").onclick = () => modalDiv.remove();
    }

    // Звонок
    function makeCall(isVideo) {
        if (!currentChatId) {
            alert("Выберите чат");
            return;
        }
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) {
            alert("Чат не найден");
            return;
        }
        if (chat.type !== 'private') {
            alert("Звонки доступны только в личных чатах");
            return;
        }
        // Найти ID собеседника
        const participants = chat.participants; // массив id
        const targetUserId = participants.find(p => p !== myUserId);
        if (!targetUserId) {
            alert("Не удалось определить собеседника");
            return;
        }
        socket.emit('call_user', { targetUserId, isVideo });
    }

    // Копирование ID
    document.getElementById("myIdDisplay").addEventListener("click", () => {
        navigator.clipboard.writeText(myUserId);
        alert("Ваш ID скопирован!");
    });

    // UI элементы
    document.getElementById("sendMessageBtn").addEventListener("click", sendMessage);
    document.getElementById("messageInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
    document.getElementById("voiceMessageBtn").addEventListener("click", () => {
        if (!currentChatId) { alert("Выберите чат"); return; }
        if (isRecording) stopVoiceRecording();
        else startVoiceRecording();
    });
    document.getElementById("addContactBtn").addEventListener("click", showAddContactModal);
    document.getElementById("createGroupBtn").addEventListener("click", showCreateGroupModal);
    document.getElementById("voiceCallBtn").addEventListener("click", () => makeCall(false));
    document.getElementById("videoCallBtn").addEventListener("click", () => makeCall(true));

    // Emoji
    const emojiBtn = document.getElementById("emojiBtn");
    const emojiDropdown = document.getElementById("emojiDropdown");
    emojiBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        emojiDropdown.classList.toggle("hidden");
    });
    document.querySelectorAll(".emoji-dropdown span").forEach(span => {
        span.addEventListener("click", (e) => {
            const emoji = e.target.innerText;
            document.getElementById("messageInput").value += emoji;
            emojiDropdown.classList.add("hidden");
        });
    });
    document.addEventListener("click", (e) => {
        if (!emojiBtn.contains(e.target) && !emojiDropdown.contains(e.target)) {
            emojiDropdown.classList.add("hidden");
        }
    });

    // Мобильное меню
    function openSidebar() {
        document.getElementById("sidebar").classList.add("open");
        document.getElementById("menuOverlay").classList.add("open");
    }
    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("menuOverlay").classList.remove("open");
    }
    function closeSidebarOnMobile() {
        if (window.innerWidth < 768) closeSidebar();
    }
    document.getElementById("menuToggle").addEventListener("click", openSidebar);
    document.getElementById("closeSidebar").addEventListener("click", closeSidebar);
    document.getElementById("menuOverlay").addEventListener("click", closeSidebar);

    // Tabs
    const tabBtns = document.querySelectorAll(".tab-btn");
    const chatsDiv = document.getElementById("chatsList");
    const contactsDiv = document.getElementById("contactsList");
    tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            const tab = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (tab === "chats") {
                chatsDiv.classList.remove("hidden");
                contactsDiv.classList.add("hidden");
            } else {
                chatsDiv.classList.add("hidden");
                contactsDiv.classList.remove("hidden");
                renderContactsList();
            }
            closeSidebarOnMobile();
        });
    });

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Добавим обработчик для запроса контактов (если понадобится)
    socket.on('contacts_list', (data) => {
        contacts = data;
        renderContactsList();
    });
    // Если захотим обновить принудительно, можно отправить событие на сервер, но пока не нужно.
</script>
</body>
  </html>
