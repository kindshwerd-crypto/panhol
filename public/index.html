<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pанхол Мессенджер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
    body {
      background: #0f1724;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 16px;
    }
    #auth {
      background: #1e293b;
      padding: 2rem;
      border-radius: 16px;
      width: 360px;
      max-width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #auth h2 { margin-bottom: 1.5rem; text-align: center; background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #auth input {
      width: 100%;
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
    }
    #auth input:focus { outline: 2px solid #8b5cf6; border-color: transparent; }
    #auth button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    #loginBtn { background: #8b5cf6; color: #fff; }
    #loginBtn:hover { background: #7c3aed; }
    #registerBtn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    #registerBtn:hover { background: #334155; color: #fff; }
    #authMessage { color: #f87171; margin-top: 12px; text-align: center; min-height: 1.5rem; }

    #chat {
      display: none;
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      flex-direction: row;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #chat.active { display: flex; }

    .sidebar {
      width: 240px;
      background: #0f172a;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid #334155;
      overflow-y: auto;
    }
    .sidebar .user-info {
      color: #94a3b8;
      font-size: 0.85rem;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 8px;
    }
    .sidebar .user-info strong { color: #fff; }
    .sidebar .tab-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: 8px 12px;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    .sidebar .tab-btn:hover { background: #1e293b; color: #fff; }
    .sidebar .tab-btn.active { background: #334155; color: #fff; }
    .sidebar .list {
      flex: 1;
      overflow-y: auto;
      margin-top: 6px;
    }
    .sidebar .list-item {
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .sidebar .list-item:hover { background: #1e293b; }
    .sidebar .list-item.active { background: #2d3a4f; }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      background: #0f172a;
    }
    .chat-header {
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 8px;
    }
    .message {
      background: #1e293b;
      padding: 8px 14px;
      border-radius: 12px;
      max-width: 80%;
      align-self: flex-start;
    }
    .message.own { align-self: flex-end; background: #2d3a4f; }
    .message .sender { font-size: 0.75rem; color: #94a3b8; margin-bottom: 2px; }
    .message .text { word-wrap: break-word; }
    .message .time { font-size: 0.65rem; color: #64748b; margin-top: 4px; text-align: right; }
    .system-message { align-self: center; background: none; color: #94a3b8; font-style: italic; font-size: 0.85rem; }
    .input-area {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
    }
    .input-area input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
    }
    .input-area input:focus { outline: 2px solid #8b5cf6; border-color: transparent; }
    .input-area button {
      padding: 10px 24px;
      border: none;
      border-radius: 24px;
      background: #8b5cf6;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .input-area button:hover { background: #7c3aed; }

    @media (max-width: 768px) {
      .sidebar { width: 180px; padding: 12px 8px; }
      .chat-area { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth">
  <h2>📡 Pанхол</h2>
  <input id="loginUsername" placeholder="Логин" value="test">
  <input id="loginPassword" type="password" placeholder="Пароль" value="123">
  <button id="loginBtn">Войти</button>
  <button id="registerBtn">Зарегистрироваться</button>
  <div id="authMessage"></div>
</div>

<!-- ЧАТ -->
<div id="chat">
  <div class="sidebar">
    <div class="user-info">👤 <strong id="displayName">Гость</strong></div>
    <button class="tab-btn active" data-tab="channels">📢 Каналы</button>
    <button class="tab-btn" data-tab="groups">👥 Группы</button>
    <button class="tab-btn" data-tab="direct">💬 Личные</button>
    <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
    <div id="listContainer" class="list">
      <!-- сюда будут списки -->
    </div>
  </div>
  <div class="chat-area">
    <div class="chat-header" id="chatHeader">#общий</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
      <button id="sendBtn">➤ Отправить</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // --- DOM элементы ---
    const authDiv = document.getElementById('auth');
    const chatDiv = document.getElementById('chat');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const authMessage = document.getElementById('authMessage');

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatHeader = document.getElementById('chatHeader');
    const displayNameSpan = document.getElementById('displayName');
    const listContainer = document.getElementById('listContainer');

    // --- Состояние ---
    let ws = null;
    let currentUser = null;
    let currentTab = 'channels'; // channels, groups, direct, settings
    let currentTarget = 'общий'; // для channels — имя канала, для групп — groupId, для direct — username
    let currentType = 'channel'; // channel, group, direct

    // Кэш данных
    let channelsList = [];
    let groupsList = [];
    let directChats = [];

    // --- WebSocket ---
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${protocol}//${window.location.host}`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        console.log('✅ WebSocket подключён');
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          handleServerMessage(data);
        } catch (err) {
          console.error('Ошибка парсинга:', err);
        }
      };

      ws.onclose = () => {
        console.log('🔌 WebSocket отключён, переподключение через 3с...');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = (err) => {
        console.error('Ошибка WebSocket:', err);
      };
    }

    // --- Обработка сообщений с сервера ---
    function handleServerMessage(data) {
      switch (data.type) {
        case 'auth_success': {
          currentUser = data.username;
          authDiv.style.display = 'none';
          chatDiv.classList.add('active');
          displayNameSpan.textContent = currentUser;
          // запросить списки (уже отправили initial_data)
          break;
        }
        case 'auth_fail': {
          authMessage.textContent = data.message || 'Ошибка авторизации';
          break;
        }
        case 'initial_data': {
          channelsList = data.channels || [];
          groupsList = data.groups || [];
          directChats = data.directChats || [];
          renderList();
          // Если каналов нет, создать 'общий'
          if (!channelsList.includes('общий')) {
            // Отправим запрос на создание (но сервер сам создаст при первом join)
            ws.send(JSON.stringify({ type: 'join_channel', payload: { channel: 'общий' } }));
          }
          // Установить первый канал
          if (channelsList.length > 0) {
            switchTab('channels');
            selectChannel(channelsList[0]);
          }
          break;
        }
        case 'channel_joined': {
          if (!channelsList.includes(data.channel)) {
            channelsList.push(data.channel);
            renderList();
          }
          break;
        }
        case 'channel_message': {
          if (currentType === 'channel' && currentTarget === data.channel) {
            appendMessage(data.message, false);
          }
          break;
        }
        case 'group_message': {
          if (currentType === 'group' && currentTarget === data.groupId) {
            appendMessage(data.message, false);
          }
          break;
        }
        case 'direct_message': {
          if (currentType === 'direct' && currentTarget === data.from) {
            appendMessage({ username: data.from, text: data.message.text, timestamp: data.message.timestamp, isSystem: false }, false);
          }
          break;
        }
        case 'direct_message_echo': {
          if (currentType === 'direct' && currentTarget === data.to) {
            appendMessage({ username: currentUser, text: data.message.text, timestamp: data.message.timestamp, isSystem: false }, true);
          }
          break;
        }
        case 'group_created': {
          groupsList.push({ id: data.groupId, name: data.groupName, members: [currentUser] });
          renderList();
          break;
        }
        case 'group_invite': {
          // Просто уведомление, можно добавить в список
          alert(`Приглашение в группу "${data.groupName}" от ${data.from}`);
          // Обновить список групп (можно запросить заново, но для простоты добавим)
          if (!groupsList.find(g => g.id === data.groupId)) {
            groupsList.push({ id: data.groupId, name: data.groupName, members: [] });
            renderList();
          }
          break;
        }
        case 'settings_updated': {
          displayNameSpan.textContent = data.displayName;
          break;
        }
        default:
          console.log('Неизвестный тип от сервера:', data);
      }
    }

    // --- Отправка сообщений на сервер ---
    function sendToServer(type, payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type, payload }));
      } else {
        console.warn('Нет соединения с сервером');
      }
    }

    // --- UI функции ---
    function appendMessage(msg, isOwn) {
      const div = document.createElement('div');
      div.className = 'message' + (isOwn ? ' own' : '');
      if (msg.isSystem) div.classList.add('system-message');
      const sender = msg.username || 'Система';
      const text = msg.text || '';
      const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
      div.innerHTML = `
        ${!msg.isSystem ? `<div class="sender">${sender}</div>` : ''}
        <div class="text">${text}</div>
        ${time ? `<div class="time">${time}</div>` : ''}
      `;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function renderList() {
      if (currentTab === 'channels') {
        listContainer.innerHTML = channelsList.map(ch => 
          `<div class="list-item ${ch === currentTarget ? 'active' : ''}" data-type="channel" data-target="${ch}"># ${ch}</div>`
        ).join('');
      } else if (currentTab === 'groups') {
        listContainer.innerHTML = groupsList.map(g => 
          `<div class="list-item ${g.id === currentTarget ? 'active' : ''}" data-type="group" data-target="${g.id}">👥 ${g.name}</div>`
        ).join('');
      } else if (currentTab === 'direct') {
        // Для личных чатов покажем список собеседников (из directChats)
        // directChats содержит ключи вида "user1:user2"
        const partners = directChats.map(key => {
          const parts = key.split(':');
          return parts[0] === currentUser ? parts[1] : parts[0];
        }).filter(p => p !== currentUser);
        // Уникальные
        const unique = [...new Set(partners)];
        listContainer.innerHTML = unique.map(p => 
          `<div class="list-item ${p === currentTarget ? 'active' : ''}" data-type="direct" data-target="${p}">💬 ${p}</div>`
        ).join('');
      } else if (currentTab === 'settings') {
        listContainer.innerHTML = `
          <div style="padding: 12px;">
            <label>Отображаемое имя:</label>
            <input id="settingsDisplayName" value="${displayNameSpan.textContent}" style="width:100%; margin-top:6px; padding:6px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:#fff;">
            <button id="settingsSaveBtn" style="margin-top:12px; padding:8px 16px; background:#8b5cf6; border:none; border-radius:6px; color:#fff; cursor:pointer;">Сохранить</button>
          </div>
        `;
        document.getElementById('settingsSaveBtn')?.addEventListener('click', () => {
          const newName = document.getElementById('settingsDisplayName').value.trim();
          if (newName) {
            sendToServer('set_display_name', { displayName: newName });
          }
        });
        return;
      }
      // Добавляем обработчики кликов на элементы списка
      listContainer.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => {
          const type = el.dataset.type;
          const target = el.dataset.target;
          if (type === 'channel') selectChannel(target);
          else if (type === 'group') selectGroup(target);
          else if (type === 'direct') selectDirect(target);
        });
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
      renderList();
      // Очистить сообщения и установить заголовок
      messagesDiv.innerHTML = '';
      if (tab === 'channels') {
        chatHeader.textContent = '# ' + (currentTarget || 'общий');
        // Загрузить историю канала? Сервер пока не отдаёт историю, можно добавить позже.
        // Пока показываем только новые сообщения.
      } else if (tab === 'groups') {
        const group = groupsList.find(g => g.id === currentTarget);
        chatHeader.textContent = '👥 ' + (group ? group.name : 'Группа');
      } else if (tab === 'direct') {
        chatHeader.textContent = '💬 ' + (currentTarget || 'Личный чат');
      } else if (tab === 'settings') {
        chatHeader.textContent = '⚙️ Настройки';
      }
    }

    function selectChannel(channel) {
      currentType = 'channel';
      currentTarget = channel;
      switchTab('channels');
    }

    function selectGroup(groupId) {
      currentType = 'group';
      currentTarget = groupId;
      switchTab('groups');
    }

    function selectDirect(username) {
      currentType = 'direct';
      currentTarget = username;
      switchTab('direct');
    }

    // --- Отправка сообщения ---
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('Нет соединения с сервером');
        return;
      }
      if (currentTab === 'channels') {
        sendToServer('send_channel', { channel: currentTarget, text });
      } else if (currentTab === 'groups') {
        sendToServer('send_group', { groupId: currentTarget, text });
      } else if (currentTab === 'direct') {
        sendToServer('send_direct', { to: currentTarget, text });
      } else {
        alert('Выберите чат для отправки');
        return;
      }
      messageInput.value = '';
      messageInput.focus();
    }

    // --- Инициализация ---
    function init() {
      connectWebSocket();

      // Кнопки авторизации
      loginBtn.addEventListener('click', () => {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (!username || !password) {
          authMessage.textContent = 'Заполните все поля';
          return;
        }
        sendToServer('login', { username, password });
      });

      registerBtn.addEventListener('click', () => {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (!username || !password) {
          authMessage.textContent = 'Заполните все поля';
          return;
        }
        sendToServer('register', { username, password, displayName: username });
      });

      // Отправка сообщения
      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      // Переключение вкладок
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === 'channels' && channelsList.length) {
            if (!currentTarget || !channelsList.includes(currentTarget)) {
              selectChannel(channelsList[0]);
            } else {
              switchTab('channels');
            }
          } else if (tab === 'groups') {
            if (groupsList.length) {
              if (!currentTarget || !groupsList.find(g => g.id === currentTarget)) {
                selectGroup(groupsList[0].id);
              } else {
                switchTab('groups');
              }
            } else {
              // предложить создать группу
              const name = prompt('Введите название группы:');
              if (name) sendToServer('create_group', { groupName: name });
            }
          } else if (tab === 'direct') {
            if (directChats.length) {
              // переключиться на первый личный чат
              const partner = directChats[0].split(':').find(p => p !== currentUser);
              if (partner) selectDirect(partner);
              else switchTab('direct');
            } else {
              alert('У вас пока нет личных чатов. Напишите кому-нибудь в личные сообщения, и чат появится.');
            }
          } else if (tab === 'settings') {
            switchTab('settings');
          }
        });
      });
    }

    init();
  })();
</script>
</body>
</html>
