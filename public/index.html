<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pанхол Мессенджер | Онлайн чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e2a3a, #0f1724);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Статус подключения */
        .connection-status {
            background: #0f172a;
            padding: 10px 24px;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-count {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #60a5fa;
            font-weight: 500;
        }

        /* Header */
        .chat-header {
            background: rgba(15, 23, 36, 0.9);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .user-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e293b;
            padding: 6px 18px;
            border-radius: 100px;
        }

        .user-control label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        #username {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        #username:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
        }

        .message.system {
            align-self: center;
            max-width: 85%;
        }

        .message.system .message-bubble {
            background: rgba(100, 116, 139, 0.25);
            text-align: center;
            font-style: italic;
            font-size: 0.85rem;
            color: #94a3b8;
            backdrop-filter: blur(4px);
        }

        .message-avatar {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-bubble {
            background: #1e293b;
            padding: 10px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            color: #e2e8f0;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.45;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-bottom-right-radius: 5px;
            border-bottom-left-radius: 20px;
        }

        .message-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 5px;
            margin-left: 12px;
        }

        /* Input area */
        .input-area {
            background: rgba(15, 23, 36, 0.95);
            padding: 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 12px 20px;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            resize: none;
            font-family: inherit;
        }

        #messageInput:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        #messageInput:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 0 32px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-area::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        
        .messages-area::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
        
        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #5b6e8c;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .chat-container {
                height: 95vh;
                border-radius: 20px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .chat-header {
                padding: 12px 16px;
            }
            
            .chat-header h1 {
                font-size: 1.2rem;
            }
            
            .user-control {
                padding: 4px 12px;
            }
            
            #username {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            
            .messages-area {
                padding: 15px;
            }
            
            .input-area {
                padding: 12px 16px;
            }
            
            button {
                padding: 0 20px;
            }
        }

        /* Анимация печати */
        @keyframes typing {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="connection-status">
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Подключение...</span>
        </div>
        <div class="online-count" id="onlineCount">👥 Онлайн: --</div>
    </div>

    <div class="chat-header">
        <h1>📡 Pанхол · Мессенджер</h1>
        <div class="user-control">
            <label>👤 Имя:</label>
            <input type="text" id="username" maxlength="30" placeholder="Ваше имя" autocomplete="off">
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message system">
            <div class="message-bubble">🔄 Подключение к серверу...</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off" disabled>
        </div>
        <button id="sendBtn" disabled>➤ Отправить</button>
    </div>
</div>

<script>
    // --- Конфигурация ---
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    let ws = null;
    let currentUsername = 'Гость';
    let isConnected = false;
    let messageQueue = [];
    let allMessages = []; // Храним все сообщения локально

    // --- DOM элементы ---
    const messagesContainer = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendBtn');
    const usernameInput = document.getElementById('username');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const onlineCountSpan = document.getElementById('onlineCount');

    // --- Вспомогательные функции ---
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const isToday = date.toDateString() === now.toDateString();
        
        if (isToday) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else {
            return date.toLocaleDateString([], { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
    }

    function updateConnectionStatus(connected) {
        isConnected = connected;
        if (connected) {
            statusDot.classList.add('connected');
            statusText.textContent = 'Подключено';
            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.focus();
        } else {
            statusDot.classList.remove('connected');
            statusText.textContent = 'Отключено';
            messageInput.disabled = true;
            sendButton.disabled = true;
        }
    }

    function scrollToBottom() {
        if (messagesContainer) {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    }

    // --- Отображение сообщений ---
    function renderMessages() {
        if (!messagesContainer) return;
        
        const currentUser = currentUsername;
        
        if (allMessages.length === 0) {
            messagesContainer.innerHTML = '<div class="message system"><div class="message-bubble">✨ Чат пуст. Напишите первое сообщение!</div></div>';
            return;
        }
        
        messagesContainer.innerHTML = allMessages.map(msg => {
            const isOwn = (msg.username === currentUser && !msg.isSystem);
            const isSystem = msg.isSystem || msg.username === 'Система';
            const timeStr = formatTime(msg.timestamp);
            const displayName = isSystem ? '📢 ' + msg.username : msg.username;
            
            let messageClass = 'message';
            if (isOwn) messageClass += ' own';
            if (isSystem) messageClass += ' system';
            
            return `
                <div class="${messageClass}">
                    <div class="message-avatar">
                        <span>${escapeHtml(displayName)}</span>
                    </div>
                    <div class="message-bubble">
                        ${escapeHtml(msg.text)}
                    </div>
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
        }).join('');
        
        scrollToBottom();
    }

    // --- Отправка сообщения на сервер ---
    function sendMessageToServer(text) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.log('Нет соединения с сервером');
            return false;
        }
        
        ws.send(JSON.stringify({
            type: 'message',
            text: text.trim()
        }));
        return true;
    }

    // --- Отправка имени на сервер ---
    function sendUsernameToServer(username) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            return false;
        }
        
        ws.send(JSON.stringify({
            type: 'set_username',
            username: username
        }));
        return true;
    }

    // --- Обработка входящих сообщений от сервера ---
    function handleWebSocketMessage(data) {
        switch (data.type) {
            case 'connected':
                console.log('Подключено к серверу:', data.message);
                updateConnectionStatus(true);
                break;
                
            case 'history':
                if (data.messages && Array.isArray(data.messages)) {
                    allMessages = data.messages;
                    renderMessages();
                }
                break;
                
            case 'new_message':
                allMessages.push(data.message);
                renderMessages();
                break;
                
            case 'online_count':
                if (onlineCountSpan) {
                    onlineCountSpan.textContent = `👥 Онлайн: ${data.count}`;
                }
                break;
                
            default:
                console.log('Неизвестный тип сообщения:', data);
        }
    }

    // --- Подключение к WebSocket ---
    function connectWebSocket() {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            console.log('✅ WebSocket подключен');
            updateConnectionStatus(true);
            
            // Отправляем имя пользователя
            const username = usernameInput.value.trim() || 'Гость';
            currentUsername = username;
            sendUsernameToServer(username);
            
            // Отправляем накопившиеся сообщения
            messageQueue.forEach(msg => {
                sendMessageToServer(msg);
            });
            messageQueue = [];
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            } catch (error) {
                console.error('Ошибка парсинга сообщения:', error);
            }
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket ошибка:', error);
            updateConnectionStatus(false);
        };
        
        ws.onclose = () => {
            console.log('🔌 WebSocket отключен');
            updateConnectionStatus(false);
            
            // Попытка переподключения через 3 секунды
            setTimeout(() => {
                if (!isConnected) {
                    console.log('🔄 Попытка переподключения...');
                    connectWebSocket();
                }
            }, 3000);
        };
    }

    // --- Отправка сообщения (из UI) ---
    function sendMessage() {
        const text = messageInput.value;
        if (!text.trim()) return;
        
        if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
            sendMessageToServer(text);
            messageInput.value = '';
            messageInput.focus();
        } else {
            // Если нет соединения, сохраняем в очередь
            messageQueue.push(text);
            messageInput.value = '';
            alert('⚠️ Нет соединения с сервером. Сообщение будет отправлено при подключении.');
        }
    }

    // --- Смена имени ---
    function onUsernameChange() {
        const newUsername = usernameInput.value.trim();
        if (newUsername && newUsername !== currentUsername) {
            currentUsername = newUsername;
            if (isConnected) {
                sendUsernameToServer(currentUsername);
            }
            // Обновляем отображение сообщений (меняем принадлежность)
            renderMessages();
        }
    }

    // --- Инициализация ---
    function init() {
        // Устанавливаем начальное имя из localStorage
        const savedUsername = localStorage.getItem('panhol_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
            currentUsername = savedUsername;
        } else {
            usernameInput.value = 'Гость';
            currentUsername = 'Гость';
        }
        
        // Подключаемся к серверу
        connectWebSocket();
        
        // Обработчики событий
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        usernameInput.addEventListener('change', () => {
            onUsernameChange();
            localStorage.setItem('panhol_username', usernameInput.value);
        });
        
        // Фокус на поле ввода
        setTimeout(() => messageInput.focus(), 100);
    }
    
    // Запускаем приложение
    init();
</script>
</body>
  </html>
