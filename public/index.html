<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pанхол Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0f1724;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- АВТОРИЗАЦИЯ --- */
    #auth {
      background: #1e293b;
      padding: 2rem 1.5rem;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      margin: 0 auto;
    }
    #auth h2 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #auth input {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      -webkit-appearance: none;
    }
    #auth input:focus {
      outline: 2px solid #8b5cf6;
      border-color: transparent;
    }
    #auth button {
      width: 100%;
      padding: 14px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      touch-action: manipulation;
    }
    #loginBtn {
      background: #8b5cf6;
      color: #fff;
    }
    #loginBtn:hover { background: #7c3aed; }
    #registerBtn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    #registerBtn:hover { background: #334155; color: #fff; }
    #authMessage {
      color: #f87171;
      text-align: center;
      margin-top: 12px;
      min-height: 1.5rem;
      font-size: 0.9rem;
    }

    /* --- ЧАТ (контейнер) --- */
    #chat {
      display: none;
      width: 100%;
      height: 100vh;
      background: #0f172a;
      flex-direction: column;
      position: relative;
    }
    #chat.active { display: flex; }

    /* --- Верхняя панель --- */
    .chat-header-bar {
      background: #1e293b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      min-height: 60px;
    }
    .chat-header-bar .menu-toggle {
      font-size: 1.8rem;
      background: none;
      border: none;
      color: #e2e8f0;
      cursor: pointer;
      padding: 4px 8px;
      touch-action: manipulation;
    }
    .chat-header-bar .chat-title {
      font-weight: 600;
      font-size: 1.1rem;
      flex: 1;
      margin-left: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-header-bar .user-badge {
      background: #334155;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      color: #94a3b8;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* --- Боковое меню (выезжающее) --- */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }
    .sidebar-overlay.open { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: #1e293b;
      z-index: 11;
      padding: 20px 16px;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: 2px 0 12px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }

    .sidebar .user-info {
      color: #94a3b8;
      font-size: 0.9rem;
      padding-bottom: 16px;
      border-bottom: 1px solid #334155;
      margin-bottom: 16px;
    }
    .sidebar .user-info strong { color: #fff; }

    .sidebar .tab-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      touch-action: manipulation;
    }
    .sidebar .tab-btn:hover { background: #334155; color: #fff; }
    .sidebar .tab-btn.active { background: #334155; color: #fff; }

    .sidebar .list {
      flex: 1;
      overflow-y: auto;
      margin-top: 8px;
      padding-bottom: 80px;
    }
    .sidebar .list-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.95rem;
      touch-action: manipulation;
    }
    .sidebar .list-item:active { background: #2d3a4f; }
    .sidebar .list-item.active { background: #2d3a4f; }

    /* --- Область сообщений --- */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f172a;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 85%;
      align-self: flex-start;
      word-wrap: break-word;
    }
    .message.own {
      align-self: flex-end;
      background: #2d3a4f;
    }
    .message .sender {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .message .text {
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .message .time {
      font-size: 0.6rem;
      color: #64748b;
      margin-top: 4px;
      text-align: right;
    }
    .system-message {
      align-self: center;
      background: none;
      color: #94a3b8;
      font-style: italic;
      font-size: 0.8rem;
      padding: 4px 12px;
    }

    /* --- Панель ввода --- */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 30px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      min-height: 52px;
    }
    .input-area input:focus {
      outline: 2px solid #8b5cf6;
      border-color: transparent;
    }
    .input-area button {
      padding: 0 24px;
      border: none;
      border-radius: 30px;
      background: #8b5cf6;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      touch-action: manipulation;
      min-height: 52px;
      min-width: 80px;
    }
    .input-area button:active { background: #7c3aed; }

    /* --- Специально для настроек --- */
    .settings-panel {
      padding: 16px;
    }
    .settings-panel label {
      display: block;
      margin-bottom: 6px;
      color: #94a3b8;
    }
    .settings-panel input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .settings-panel button {
      padding: 14px 24px;
      background: #8b5cf6;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* --- Планшеты и десктопы (от 768px) --- */
    @media (min-width: 768px) {
      #chat {
        flex-direction: row;
        height: 90vh;
        max-width: 1200px;
        border-radius: 20px;
        margin: 20px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      .chat-header-bar .menu-toggle {
        display: none;
      }
      .sidebar-overlay { display: none !important; }
      .sidebar {
        position: static;
        width: 240px;
        height: 100%;
        left: 0;
        background: #0f172a;
        border-right: 1px solid #334155;
        padding: 20px 12px;
        box-shadow: none;
        transition: none;
        overflow-y: auto;
      }
      .sidebar .list {
        padding-bottom: 20px;
      }
      .chat-area {
        flex: 1;
      }
      .input-area input {
        min-height: 48px;
      }
      .input-area button {
        min-height: 48px;
      }
    }

    /* --- Адаптация для очень маленьких экранов --- */
    @media (max-width: 400px) {
      .chat-header-bar .chat-title { font-size: 0.9rem; }
      .message { max-width: 95%; }
      .input-area input { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth">
  <h2>📡 Pанхол</h2>
  <input id="loginUsername" placeholder="Логин" value="test">
  <input id="loginPassword" type="password" placeholder="Пароль" value="123">
  <button id="loginBtn">Войти</button>
  <button id="registerBtn">Зарегистрироваться</button>
  <div id="authMessage"></div>
</div>

<!-- ЧАТ -->
<div id="chat">
  <!-- Верхняя панель -->
  <div class="chat-header-bar">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <span class="chat-title" id="chatTitle">#общий</span>
    <span class="user-badge" id="userBadge">Гость</span>
  </div>

  <!-- Затемнение при открытом меню -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Боковое меню -->
  <div class="sidebar" id="sidebar">
    <div class="user-info">👤 <strong id="displayName">Гость</strong></div>
    <button class="tab-btn active" data-tab="channels">📢 Каналы</button>
    <button class="tab-btn" data-tab="groups">👥 Группы</button>
    <button class="tab-btn" data-tab="direct">💬 Личные</button>
    <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
    <div id="listContainer" class="list">
      <!-- список будет вставлен сюда -->
    </div>
  </div>

  <!-- Область чата -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="messageInput" placeholder="Сообщение..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // --- DOM ---
    const authDiv = document.getElementById('auth');
    const chatDiv = document.getElementById('chat');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const authMessage = document.getElementById('authMessage');

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatTitle = document.getElementById('chatTitle');
    const displayNameSpan = document.getElementById('displayName');
    const userBadge = document.getElementById('userBadge');
    const listContainer = document.getElementById('listContainer');

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    // --- Состояние ---
    let ws = null;
    let currentUser = null;
    let currentTab = 'channels';
    let currentTarget = 'общий';
    let currentType = 'channel';

    let channelsList = [];
    let groupsList = [];
    let directChats = [];

    // --- WebSocket ---
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      ws.onopen = () => console.log('✅ WebSocket подключён');
      ws.onmessage = (e) => {
        try { handleServerMessage(JSON.parse(e.data)); }
        catch(err) { console.error('Ошибка парсинга:', err); }
      };
      ws.onclose = () => {
        console.log('🔌 Отключён, переподключение через 3с...');
        setTimeout(connectWebSocket, 3000);
      };
      ws.onerror = (err) => console.error('WebSocket ошибка:', err);
    }

    // --- Обработка сообщений с сервера ---
    function handleServerMessage(data) {
      switch (data.type) {
        case 'auth_success':
          currentUser = data.username;
          authDiv.style.display = 'none';
          chatDiv.classList.add('active');
          displayNameSpan.textContent = currentUser;
          userBadge.textContent = currentUser;
          break;
        case 'auth_fail':
          authMessage.textContent = data.message || 'Ошибка';
          break;
        case 'initial_data':
          channelsList = data.channels || [];
          groupsList = data.groups || [];
          directChats = data.directChats || [];
          renderList();
          if (!channelsList.includes('общий')) {
            ws.send(JSON.stringify({ type: 'join_channel', payload: { channel: 'общий' } }));
          }
          if (channelsList.length) {
            switchTab('channels');
            selectChannel(channelsList[0]);
          }
          break;
        case 'channel_joined':
          if (!channelsList.includes(data.channel)) {
            channelsList.push(data.channel);
            renderList();
          }
          break;
        case 'channel_message':
          if (currentType === 'channel' && currentTarget === data.channel)
            appendMessage(data.message, false);
          break;
        case 'group_message':
          if (currentType === 'group' && currentTarget === data.groupId)
            appendMessage(data.message, false);
          break;
        case 'direct_message':
          if (currentType === 'direct' && currentTarget === data.from)
            appendMessage({ username: data.from, text: data.message.text, timestamp: data.message.timestamp }, false);
          break;
        case 'direct_message_echo':
          if (currentType === 'direct' && currentTarget === data.to)
            appendMessage({ username: currentUser, text: data.message.text, timestamp: data.message.timestamp }, true);
          break;
        case 'group_created':
          groupsList.push({ id: data.groupId, name: data.groupName, members: [currentUser] });
          renderList();
          break;
        case 'group_invite':
          alert(`Приглашение в группу "${data.groupName}" от ${data.from}`);
          if (!groupsList.find(g => g.id === data.groupId)) {
            groupsList.push({ id: data.groupId, name: data.groupName, members: [] });
            renderList();
          }
          break;
        case 'settings_updated':
          displayNameSpan.textContent = data.displayName;
          userBadge.textContent = data.displayName;
          break;
        default:
          console.log('Неизвестный тип:', data);
      }
    }

    function sendToServer(type, payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type, payload }));
      } else {
        console.warn('Нет соединения');
      }
    }

    // --- UI ---
    function appendMessage(msg, isOwn) {
      const div = document.createElement('div');
      div.className = 'message' + (isOwn ? ' own' : '');
      if (msg.isSystem) div.classList.add('system-message');
      const sender = msg.username || 'Система';
      const text = msg.text || '';
      const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
      div.innerHTML = `
        ${!msg.isSystem ? `<div class="sender">${sender}</div>` : ''}
        <div class="text">${text}</div>
        ${time ? `<div class="time">${time}</div>` : ''}
      `;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function renderList() {
      if (currentTab === 'channels') {
        listContainer.innerHTML = channelsList.map(ch =>
          `<div class="list-item ${ch === currentTarget ? 'active' : ''}" data-type="channel" data-target="${ch}"># ${ch}</div>`
        ).join('');
      } else if (currentTab === 'groups') {
        listContainer.innerHTML = groupsList.map(g =>
          `<div class="list-item ${g.id === currentTarget ? 'active' : ''}" data-type="group" data-target="${g.id}">👥 ${g.name}</div>`
        ).join('');
      } else if (currentTab === 'direct') {
        const partners = [...new Set(directChats.map(key => {
          const parts = key.split(':');
          return parts[0] === currentUser ? parts[1] : parts[0];
        }).filter(p => p !== currentUser))];
        listContainer.innerHTML = partners.map(p =>
          `<div class="list-item ${p === currentTarget ? 'active' : ''}" data-type="direct" data-target="${p}">💬 ${p}</div>`
        ).join('');
      } else if (currentTab === 'settings') {
        listContainer.innerHTML = `
          <div class="settings-panel">
            <label>Отображаемое имя</label>
            <input id="settingsDisplayName" value="${displayNameSpan.textContent}">
            <button id="settingsSaveBtn">Сохранить</button>
          </div>
        `;
        document.getElementById('settingsSaveBtn')?.addEventListener('click', () => {
          const newName = document.getElementById('settingsDisplayName').value.trim();
          if (newName) sendToServer('set_display_name', { displayName: newName });
        });
        return;
      }
      listContainer.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => {
          const type = el.dataset.type;
          const target = el.dataset.target;
          if (type === 'channel') selectChannel(target);
          else if (type === 'group') selectGroup(target);
          else if (type === 'direct') selectDirect(target);
          closeSidebar();
        });
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
      renderList();
      messagesDiv.innerHTML = '';
      if (tab === 'channels') {
        chatTitle.textContent = '# ' + (currentTarget || 'общий');
      } else if (tab === 'groups') {
        const group = groupsList.find(g => g.id === currentTarget);
        chatTitle.textContent = '👥 ' + (group ? group.name : 'Группа');
      } else if (tab === 'direct') {
        chatTitle.textContent = '💬 ' + (currentTarget || 'Личный чат');
      } else if (tab === 'settings') {
        chatTitle.textContent = '⚙️ Настройки';
      }
    }

    function selectChannel(channel) {
      currentType = 'channel';
      currentTarget = channel;
      switchTab('channels');
    }
    function selectGroup(groupId) {
      currentType = 'group';
      currentTarget = groupId;
      switchTab('groups');
    }
    function selectDirect(username) {
      currentType = 'direct';
      currentTarget = username;
      switchTab('direct');
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('Нет соединения с сервером');
        return;
      }
      if (currentTab === 'channels') {
        sendToServer('send_channel', { channel: currentTarget, text });
      } else if (currentTab === 'groups') {
        sendToServer('send_group', { groupId: currentTarget, text });
      } else if (currentTab === 'direct') {
        sendToServer('send_direct', { to: currentTarget, text });
      } else {
        alert('Выберите чат');
        return;
      }
      messageInput.value = '';
      messageInput.focus();
    }

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }

    // --- Инициализация ---
    function init() {
      connectWebSocket();

      loginBtn.addEventListener('click', () => {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (!username || !password) { authMessage.textContent = 'Заполните все поля'; return; }
        sendToServer('login', { username, password });
      });

      registerBtn.addEventListener('click', () => {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (!username || !password) { authMessage.textContent = 'Заполните все поля'; return; }
        sendToServer('register', { username, password, displayName: username });
      });

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

      menuToggle.addEventListener('click', toggleSidebar);
      sidebarOverlay.addEventListener('click', closeSidebar);

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === 'channels' && channelsList.length) {
            if (!currentTarget || !channelsList.includes(currentTarget)) selectChannel(channelsList[0]);
            else switchTab('channels');
          } else if (tab === 'groups') {
            if (groupsList.length) {
              if (!currentTarget || !groupsList.find(g => g.id === currentTarget)) selectGroup(groupsList[0].id);
              else switchTab('groups');
            } else {
              const name = prompt('Название группы:');
              if (name) sendToServer('create_group', { groupName: name });
            }
          } else if (tab === 'direct') {
            if (directChats.length) {
              const partner = directChats[0].split(':').find(p => p !== currentUser);
              if (partner) selectDirect(partner);
              else switchTab('direct');
            } else {
              alert('Пока нет личных чатов.');
            }
          } else if (tab === 'settings') {
            switchTab('settings');
          }
          closeSidebar();
        });
      });
    }

    init();
  })();
</script>
</body>
  </html>
