<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panhol — голосовой чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f1724;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #1e293b;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .header {
            padding: 16px 24px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-area input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            width: 140px;
        }
        .user-area input:focus {
            border-color: #8b5cf6;
        }
        .online-count {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f172a;
        }
        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
        }
        .message.own {
            align-self: flex-end;
            background: #8b5cf6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: rgba(100,116,139,0.2);
            color: #94a3b8;
            font-style: italic;
            font-size: 0.85rem;
            max-width: 90%;
            text-align: center;
        }
        .message .sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 2px;
        }
        .message .time {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 4px;
            text-align: right;
        }
        .message.own .time { color: #c4b5fd; }
        .input-area {
            padding: 16px 24px;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-area input[type="text"] {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 12px 20px;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            min-width: 120px;
        }
        .input-area input[type="text"]:focus {
            border-color: #8b5cf6;
        }
        .input-area button {
            background: #8b5cf6;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .input-area button:hover {
            background: #7c3aed;
        }
        .voice-controls {
            background: #1e293b;
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            border-top: 1px solid #334155;
        }
        .voice-controls button {
            background: #1e3a8a;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .voice-controls button:hover {
            background: #1e4b8a;
        }
        .voice-controls .leave-btn {
            background: #dc2626;
            display: none;
        }
        .voice-controls .leave-btn:hover {
            background: #b91c1c;
        }
        .voice-status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-left: auto;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; }
            .user-area { flex-wrap: wrap; }
            .user-area input { width: 100%; }
            .messages { padding: 12px; }
            .input-area { flex-wrap: wrap; }
            .input-area input[type="text"] { min-width: 100%; }
            .voice-controls { flex-direction: column; align-items: stretch; }
            .voice-status { margin-left: 0; text-align: center; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>📡 Panhol</h1>
        <div class="user-area">
            <input id="usernameInput" placeholder="Ваше имя" value="Гость" maxlength="20">
            <span class="online-count" id="onlineCount">👥 0</span>
        </div>
    </div>
    <div class="messages" id="messagesContainer">
        <div class="message system">💬 Добро пожаловать в Panhol!</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>
    <div class="voice-controls">
        <button id="joinVoiceBtn">🎤 Войти в голосовой чат</button>
        <button id="leaveVoiceBtn" class="leave-btn">⏹ Выйти из чата</button>
        <span class="voice-status" id="voiceStatus">Статус: Не в сети</span>
    </div>
</div>

<script>
    const socket = io();
    let username = localStorage.getItem('panhol_username') || 'Гость';
    document.getElementById('usernameInput').value = username;

    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const onlineCount = document.getElementById('onlineCount');

    // --- Сообщения ---
    function addMessageToChat(msg, isOwn = false, isSystem = false) {
        const div = document.createElement('div');
        div.className = 'message';
        if (isSystem) div.classList.add('system');
        else if (isOwn) div.classList.add('own');
        else div.classList.add('other');

        let content = '';
        if (!isSystem) {
            content += `<div class="sender">${escapeHtml(msg.username)}</div>`;
        }
        content += `<div>${escapeHtml(msg.text)}</div>`;
        if (msg.timestamp) {
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            content += `<div class="time">${time}</div>`;
        }
        div.innerHTML = content;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Отправка сообщения ---
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        const currentUsername = document.getElementById('usernameInput').value.trim() || 'Гость';
        socket.emit('send_message', { username: currentUsername, text });
        messageInput.value = '';
        messageInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Сохраняем имя при изменении
    document.getElementById('usernameInput').addEventListener('change', function() {
        localStorage.setItem('panhol_username', this.value.trim() || 'Гость');
    });

    // --- События с сервера ---
    socket.on('history', (data) => {
        messagesContainer.innerHTML = '';
        data.messages.forEach(msg => {
            const isOwn = (msg.username === document.getElementById('usernameInput').value.trim());
            addMessageToChat(msg, isOwn, msg.isSystem);
        });
    });

    socket.on('new_message', (data) => {
        if (data.type === 'new_message' && data.message) {
            const msg = data.message;
            const currentUsername = document.getElementById('usernameInput').value.trim();
            const isOwn = (msg.username === currentUsername);
            addMessageToChat(msg, isOwn, msg.isSystem);
        }
    });

    socket.on('online_count', (data) => {
        onlineCount.textContent = `👥 ${data.count}`;
    });

    // --- Голосовой чат (WebRTC) ---
    const remoteAudio = document.createElement('audio');
    remoteAudio.autoplay = true;
    let localStream = null;
    let peerConnection = null;
    let currentRoomId = null;
    const configuration = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    const joinVoiceBtn = document.getElementById('joinVoiceBtn');
    const leaveVoiceBtn = document.getElementById('leaveVoiceBtn');
    const voiceStatus = document.getElementById('voiceStatus');

    async function joinVoiceRoom(roomId) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            voiceStatus.textContent = 'Статус: Микрофон получен';

            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.ontrack = (event) => {
                if (remoteAudio.srcObject !== event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    voiceStatus.textContent = 'Статус: В голосовом чате';
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('voice-signal', {
                        to: roomId,
                        signal: { type: 'candidate', candidate: event.candidate }
                    });
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('voice-signal', {
                to: roomId,
                signal: { type: 'offer', sdp: offer }
            });

            currentRoomId = roomId;
            socket.emit('join-voice-room', roomId);

            joinVoiceBtn.style.display = 'none';
            leaveVoiceBtn.style.display = 'inline-block';
            voiceStatus.textContent = 'Статус: Подключение...';

        } catch (error) {
            console.error('Ошибка:', error);
            voiceStatus.textContent = '❌ Ошибка: ' + error.message;
        }
    }

    function leaveVoiceRoom() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (remoteAudio.srcObject) {
            remoteAudio.srcObject = null;
        }
        if (currentRoomId) {
            socket.emit('leave-voice-room', currentRoomId);
            currentRoomId = null;
        }
        joinVoiceBtn.style.display = 'inline-block';
        leaveVoiceBtn.style.display = 'none';
        voiceStatus.textContent = 'Статус: Не в сети';
    }

    socket.on('voice-signal', async ({ from, signal }) => {
        if (!peerConnection) return;
        try {
            if (signal.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('voice-signal', {
                    to: from,
                    signal: { type: 'answer', sdp: answer }
                });
            } else if (signal.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
            } else if (signal.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
            }
        } catch (error) {
            console.error('Ошибка обработки сигнала:', error);
        }
    });

    socket.on('user-joined-voice', (userId) => {
        voiceStatus.textContent = `Статус: В чате (${userId})`;
    });

    socket.on('user-left-voice', (userId) => {
        voiceStatus.textContent = `Статус: В чате (тихо)`;
    });

    joinVoiceBtn.addEventListener('click', () => {
        const roomId = prompt('Введите ID комнаты (или оставьте пустым):');
        if (roomId === null) return;
        const finalRoomId = roomId.trim() || `room-${Date.now()}`;
        joinVoiceRoom(finalRoomId);
    });

    leaveVoiceBtn.addEventListener('click', leaveVoiceRoom);

    // Сохраняем имя при старте
    socket.on('connect', () => {
        // Можно отправить имя при подключении, но сервер не требует этого
        console.log('Connected to server');
    });
</script>
</body>
    </html>
